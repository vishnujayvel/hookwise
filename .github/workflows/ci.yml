name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Build
        run: |
          go build -ldflags "-X main.version=${{ github.ref_name }} -X main.commit=${{ github.sha }}" ./cmd/hookwise/

      - name: Cross-compile (linux/amd64)
        run: GOOS=linux GOARCH=amd64 go build -ldflags "-X main.version=${{ github.ref_name }} -X main.commit=${{ github.sha }}" ./cmd/hookwise/

      - name: Cross-compile (darwin/arm64)
        run: GOOS=darwin GOARCH=arm64 go build -ldflags "-X main.version=${{ github.ref_name }} -X main.commit=${{ github.sha }}" ./cmd/hookwise/
