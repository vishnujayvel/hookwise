name: Secret Scan

# Gitleaks secret + high-confidence PII scan. Defense-in-depth alongside
# GitHub's native push protection (enabled at the repo level): push protection
# blocks known provider secrets at push time; this gate scans the full history
# / PR diff against our .gitleaks.toml (which adds custom rules + fixture
# allowlists) and blocks the PR on any finding.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Detect secrets (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so historical commits are scanned too

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          # GITLEAKS_LICENSE is only required for GitHub *organization* repos.
          # hookwise is a personal/public repo, so no license is needed.
