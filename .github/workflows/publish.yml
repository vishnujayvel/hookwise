name: Publish Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Build binary via Dagger
        uses: dagger/dagger-for-github@v8.4.0
        with:
          verb: call
          args: >-
            publish
            --src=.
            --version=${{ github.ref_name }}
            --commit=${{ github.sha }}
            export --path=./hookwise-linux-amd64
          version: "v0.20.1"

      - name: Upload binary to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.ref_name }}" ./hookwise-linux-amd64
