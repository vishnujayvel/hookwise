# hookwise.yaml -- Analytics Configuration
# ==========================================
# Guards plus session tracking, AI attribution, and tool call analytics.
# Includes a status line showing AI ratio and session metrics.
# Data is stored in ~/.hookwise/analytics.db (SQLite).
#
# Usage: Copy this file to your project root as hookwise.yaml
#        View stats with: hookwise stats

version: 1

# Guard rules for safety
guards:
  - match: "Bash"
    action: block
    when: 'tool_input.command contains "rm -rf /"'
    reason: "Blocked: recursive delete of root directory"

  - match: "Bash"
    action: block
    when: 'tool_input.command contains "rm -rf ~"'
    reason: "Blocked: recursive delete of home directory"

  - match: "Bash"
    action: confirm
    when: 'tool_input.command contains "force push"'
    reason: "Force push requires confirmation"

  - match: "Read"
    action: warn
    when: 'tool_input.file_path ends_with ".env"'
    reason: "Accessing .env file - may contain secrets"

# Analytics module: tracks tool usage, session metrics, and authorship
# All tracking (sessions, tool calls, authorship) is enabled automatically
# when analytics is enabled. Data is stored in ~/.hookwise/analytics.db.
analytics:
  enabled: true

# Status line: shows analytics metrics at the bottom of Claude Code
status_line:
  enabled: true
  segments:
    - ai_ratio   # AI vs human authorship percentage
    - session    # session duration and tool call count
