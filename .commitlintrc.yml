extends:
  - "@commitlint/config-conventional"

rules:
  type-enum:
    - 2
    - always
    - - feat
      - fix
      - docs
      - chore
      - refactor
      - test
      - perf
      - ci
      - build
      - revert
  subject-case:
    - 2
    - never
    - - sentence-case
      - start-case
      - pascal-case
      - upper-case
  header-max-length:
    - 2
    - always
    - 72
  body-max-line-length:
    - 1
    - always
    - 100
